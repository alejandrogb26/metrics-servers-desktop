# Metrics Client App - Configuracion
api.base.url=https://pfc-nginx.alejandrogb.local

# Timeouts en segundos
api.connect.timeout=10
api.read.timeout=30

# SOLO DESARROLLO: aceptar certificados autofirmados/no verificados.
# IMPORTANTE: Cambiar a false y configurar un truststore real antes de distribuir en producción.
# Con true, cualquier certificado es aceptado (MITM posible en redes no controladas).
api.ssl.trust-all=true

# Modo debug: activa log level DEBUG para toda la app (peticiones HTTP, respuestas, errores).
# Mantener en false en producción.
debug=true
